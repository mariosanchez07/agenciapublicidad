<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Campañas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Listado de Campañas</h2>
    <a th:href="@{/inicio}" class="btn btn-secondary mb-3">← Volver</a>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Presupuesto</th>
                <th>Fecha Inicio</th>
                <th>Canal</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="campana : ${campanas}">
                <td th:text="${campana.id}"></td>
                <td th:text="${campana.nombreCampana}"></td>
                <td th:text="${campana.presupuesto}"></td>
                <td th:text="${campana.fechaInicio}"></td>
                <td th:text="${campana.canal}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
