<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container text-center mt-5">
    <h1 class="text-danger">¡Oops! Algo salió mal 😓</h1>
    <p class="lead">Se ha producido un error inesperado.</p>
    
    <div class="alert alert-danger text-start mt-3">
        <p><strong>Estado:</strong> <span th:text="${status}"></span></p>
        <p><strong>Error:</strong> <span th:text="${error}"></span></p>
        <p><strong>Mensaje:</strong> <span th:text="${message}"></span></p>
        <p><strong>Ruta:</strong> <span th:text="${path}"></span></p>
    </div>

    <a th:href="@{/inicio}" class="btn btn-primary">← Volver al inicio</a>
</div>
</body>
</html>
