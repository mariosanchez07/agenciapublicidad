<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Alta de Cliente</h2>
    <a th:href="@{/inicio}" class="btn btn-secondary mb-3">← Volver</a>
    <form th:action="@{/altaCliente}" th:object="${cliente}" method="post">
        <div class="mb-3">
            <label class="form-label">Nombre Empresa</label>
            <input type="text" class="form-control" th:field="*{nombreEmpresa}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Sector</label>
            <input type="text" class="form-control" th:field="*{sector}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">CIF</label>
            <input type="text" class="form-control" th:field="*{cif}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" required>
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
    </form>
</div>
</body>
</html>
