<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta Campaña</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Alta de Campaña</h2>
    <a th:href="@{/inicio}" class="btn btn-secondary mb-3">← Volver</a>
    <form th:action="@{/altaCampana}" th:object="${campana}" method="post">
        <div class="mb-3">
            <label class="form-label">Nombre Campaña</label>
            <input type="text" class="form-control" th:field="*{nombreCampana}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Presupuesto</label>
            <input type="number" step="0.01" class="form-control" th:field="*{presupuesto}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Fecha Inicio</label>
            <input type="date" class="form-control" th:field="*{fechaInicio}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Canal</label>
            <select class="form-select" th:field="*{canal}">
                <option value="TV">TV</option>
                <option value="Redes">Redes</option>
                <option value="Prensa">Prensa</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
    </form>
</div>
</body>
</html>
